<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wisata CI4 - Login</title>

<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet">

<!--[if lt IE 9]>
<script src="js/html5shiv.js"></script>
<script src="js/respond.min.js"></script>
<![endif]-->

<style>
	body {
		background: url('bukit%20kelam.jpg') no-repeat center center fixed;
		background-size: cover;
		height: 100vh;
		display: flex;
		align-items: center;
		justify-content: center;
		padding: 0 !important;
		margin: 0;
	}
	.login-overlay {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: rgba(0, 0, 0, 0.45);
		z-index: -1;
	}
	.login-wrapper {
		width: 100%;
		max-width: 420px;
		padding: 20px;
		position: relative;
		z-index: 1;
	}
	.login-logo {
		text-align: center;
		margin-bottom: 30px;
		color: #fff;
		font-size: 36px;
		font-weight: 300;
		text-transform: uppercase;
		letter-spacing: 4px;
		text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
	}
	.login-logo span {
		color: #30a5ff;
		font-weight: 800;
	}
	.login-panel {
		background: rgba(255, 255, 255, 0.95);
		border-radius: 12px;
		overflow: hidden;
		box-shadow: 0 20px 40px rgba(0,0,0,0.4);
		border: none;
	}
	.panel-heading {
		background: #fff !important;
		color: #30a5ff !important;
		text-align: center;
		font-weight: 700;
		font-size: 20px;
		text-transform: uppercase;
		letter-spacing: 1px;
		padding: 25px !important;
		height: auto !important;
		border-bottom: 1px solid #f1f4f7 !important;
	}
	.panel-body {
		padding: 35px 30px;
	}
	.form-group {
		margin-bottom: 25px;
		position: relative;
	}
	.form-control {
		height: 50px;
		border-radius: 6px;
		padding-left: 45px;
		border: 1px solid #ddd;
		font-size: 15px;
		box-shadow: none !important;
	}
	.form-control:focus {
		border-color: #30a5ff;
	}
	.form-group .glyphicon {
		position: absolute;
		left: 18px;
		top: 17px;
		color: #30a5ff;
		z-index: 2;
		font-size: 16px;
	}
	.checkbox {
		margin-bottom: 25px;
		padding-left: 5px;
	}
	.btn-primary {
		width: 100%;
		padding: 14px;
		font-weight: 700;
		font-size: 16px;
		text-transform: uppercase;
		letter-spacing: 2px;
		border-radius: 6px;
		background-color: #30a5ff;
		border: none;
		transition: all 0.3s ease;
		margin-top: 10px;
	}
	.btn-primary:hover {
		background-color: #2795e9;
		transform: translateY(-2px);
		box-shadow: 0 8px 20px rgba(48, 165, 255, 0.4);
	}
	.btn-primary:active {
		transform: translateY(0);
	}
</style>

</head>

<body>
	<div class="login-overlay"></div>
	
	<div class="login-wrapper">
		<div class="login-logo">
			<span>WISATA</span>CI4
		</div>
		
		<div class="login-panel panel panel-default">
			<div class="panel-heading">Administrator Login</div>
			<div class="panel-body">
				<form role="form" action="index.html">
					<fieldset>
						<div class="form-group">
							<span class="glyphicon glyphicon-envelope"></span>
							<input class="form-control" placeholder="E-mail" name="email" type="email" autofocus="" required>
						</div>
						<div class="form-group">
							<span class="glyphicon glyphicon-lock"></span>
							<input class="form-control" placeholder="Password" name="password" type="password" value="" required>
						</div>
						<div class="checkbox">
							<label>
								<input name="remember" type="checkbox" value="Remember Me"> Remember Me
							</label>
						</div>
						<button type="submit" class="btn btn-primary">Login</button>
					</fieldset>
				</form>
			</div>
		</div>
		<p class="text-center" style="color: rgba(255,255,255,0.7); margin-top: 30px; font-size: 13px; font-weight: 300; letter-spacing: 1px;">
			&copy; 2026 Wisata CI4. All rights reserved.
		</p>
	</div>

	<script src="js/jquery-1.11.1.min.js"></script>
	<script src="js/bootstrap.min.js"></script>
</body>
</html>
